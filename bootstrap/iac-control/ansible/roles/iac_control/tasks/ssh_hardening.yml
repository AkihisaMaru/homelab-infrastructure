- name: Deploy sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0644"
  notify: Restart ssh

- name: Validate sshd_config
  ansible.builtin.command: sshd -t -f /etc/ssh/sshd_config
  changed_when: false

- name: Ensure ssh service running
  ansible.builtin.service:
    name: ssh
    enabled: true
    state: started