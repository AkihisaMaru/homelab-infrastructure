- name: Install base packages
  ansible.builtin.apt:
    update_cache: true
    name:
      - ca-certificates
      - curl
      - git
      - gnupg
      - jq
      - unzip
      - openssh-server
    state: present

- name: Create terraform runtime user
  ansible.builtin.user:
    name: "{{ tf_user }}"
    shell: /bin/bash
    create_home: true

- name: Create workdir
  ansible.builtin.file:
    path: "{{ tf_workdir }}"
    state: directory
    owner: "{{ tf_user }}"
    group: "{{ tf_user }}"
    mode: "0750"

- name: Download terraform zip
  ansible.builtin.get_url:
    url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_{{ terraform_arch }}.zip"
    dest: "/tmp/terraform.zip"
    mode: "0644"

- name: Install terraform binary
  ansible.builtin.unarchive:
    src: "/tmp/terraform.zip"
    dest: "/usr/local/bin"
    remote_src: true
    mode: "0755"

- name: Ensure .ssh dir exists
  ansible.builtin.file:
    path: "/home/{{ tf_user }}/.ssh"
    state: directory
    owner: "{{ tf_user }}"
    group: "{{ tf_user }}"
    mode: "0700"

- name: Add runner public key
  ansible.posix.authorized_key:
    user: "{{ tf_user }}"
    key: "{{ runner_public_key }}"
    key: "{{ lookup('file', runner_public_key) }}"
    state: present
  when: runner_public_key | length > 0

- name: Force command for runner key
  ansible.builtin.lineinfile:
    path: "/home/{{ tf_user }}/.ssh/authorized_keys"
    regexp: 'ssh-ed25519 .*'
    line: 'command="{{ ssh_force_command }}",no-agent-forwarding,no-port-forwarding,no-pty {{ runner_public_key }}'
    create: true
    owner: "{{ tf_user }}"
    group: "{{ tf_user }}"
  when:
    - runner_public_key | length > 0
    - ssh_forth_command | length > 0
  
- name: Install run-terraform wrapper
  ansible.builtin.copy:
    dest: "/usr/local/bin/run-terraform.sh"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd "{{ tf_workdir }}"
      exec "$SHELL" -lc "$*"
  when: ssh_force_command | length > 0

- name: Deploy sshd_config
  ansible.builtin.template:
    src: "sshd_config.j2"
    dest: "/etc/ssh/sshd_config"
    mode: "0644"
  notify: Restart ssh

- name: Ensure ssh service enabled
  ansible.builtin.service:
    name: ssh
    enabled: true
    state: started