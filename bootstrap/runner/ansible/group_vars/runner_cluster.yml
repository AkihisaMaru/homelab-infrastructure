k3s_version: "v1.35.2-rc1+k3s1"

# GitHub
github_repo: "AkihisaMaru/homelab-infrastructure"

# ARC
arc_namespace: actions-runner-system
arc_release: arc
arc_chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
