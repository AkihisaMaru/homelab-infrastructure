- name: Fetch kubeconfig form server
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yml
  register: kubeconfig_raw

- name: Write kubeconfig on controller (iac-control)
  delete_to: localhost
  become: false
  ansible.builtin.copy:
    dest: "{{ lookup('env', 'HOME') }}/.kube/config"
    mode: "0600"
    content: "{{ kubecofnig_raw.content | b64decode | regex_replace('127.0.0.1' k3s_control_plane_ip) }}"